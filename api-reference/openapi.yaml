        # Webhook Schemas
        ApiPublicWebhook:
            type: object
            required:
                - id
                - url
                - events
                - status
                - owner
                - created_at
            properties:
                id:
                    type: string
                    example: 'wh_dyS2ZVTj'
                    description: 'Unique webhook identifier'
                url:
                    type: string
                    format: url
                    example: 'https://your-domain.com/webhooks/gigstack'
                    description: 'HTTPS endpoint URL to receive webhook events'
                events:
                    type: array
                    items:
                        type: string
                        enum:
                            - payment.created
                            - payment.updated
                            - payment.succeeded
                            - payment.canceled
                            - payment.deleted
                            - payment.upcoming_due_date
                            - invoice.created
                            - invoice.canceled
                            - invoice.failed
                            - receipt.created
                            - receipt.updated
                            - receipt.completed
                            - receipt.deleted
                            - customer.created
                            - customer.updated
                            - customer.deleted
                            - service.created
                            - service.updated
                            - service.deleted
                    example:
                        - payment.created
                        - payment.succeeded
                        - invoice.created
                    description: 'Array of event types to subscribe to'
                status:
                    type: string
                    enum: [active, inactive]
                    example: 'active'
                    description: 'Webhook status - active or inactive'
                description:
                    type: string
                    nullable: true
                    example: 'Production payment notifications'
                    description: 'Optional description of the webhook purpose'
                owner:
                    type: string
                    example: '8UWdgXELUhf022vuoq249mtGytG2'
                    description: 'User ID who created the webhook'
                created_at:
                    type: number
                    example: 1709090576567
                    description: 'Unix timestamp (milliseconds) of webhook creation'

        WebhookInput:
            type: object
            required:
                - url
                - events
            properties:
                url:
                    type: string
                    format: url
                    example: 'https://your-domain.com/webhooks/gigstack'
                    description: 'HTTPS endpoint URL to receive webhook events'
                events:
                    type: array
                    minItems: 1
                    items:
                        type: string
                        enum:
                            - payment.created
                            - payment.updated
                            - payment.succeeded
                            - payment.canceled
                            - payment.deleted
                            - payment.upcoming_due_date
                            - invoice.created
                            - invoice.canceled
                            - invoice.failed
                            - receipt.created
                            - receipt.updated
                            - receipt.completed
                            - receipt.deleted
                            - customer.created
                            - customer.updated
                            - customer.deleted
                            - service.created
                            - service.updated
                            - service.deleted
                    example:
                        - payment.created
                        - payment.succeeded
                    description: 'Array of event types to subscribe to (at least one required)'
                description:
                    type: string
                    nullable: true
                    example: 'Production webhook for payment events'
                    description: 'Optional description of the webhook purpose'
                status:
                    type: string
                    enum: [active, inactive]
                    default: active
                    nullable: true
                    example: 'active'
                    description: 'Webhook status - defaults to active'

        WebhookUpdateInput:
            type: object
            properties:
                url:
                    type: string
                    format: url
                    nullable: true
                    example: 'https://new-domain.com/webhooks/gigstack'
                    description: 'HTTPS endpoint URL to receive webhook events'
                events:
                    type: array
                    minItems: 1
                    nullable: true
                    items:
                        type: string
                        enum:
                            - payment.created
                            - payment.updated
                            - payment.succeeded
                            - payment.canceled
                            - payment.deleted
                            - payment.upcoming_due_date
                            - invoice.created
                            - invoice.canceled
                            - invoice.failed
                            - receipt.created
