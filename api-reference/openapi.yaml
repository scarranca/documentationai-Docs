    /payments/request:
        post:
            tags:
                - Payments
            summary: Request payment
            description: |
                Create a payment request that creates a payment in 'requires_payment_method' status.

                **gigstack Connect:** Create payment requests for other teams using the `team` parameter.

                ## Payment Request Flow

                This endpoint creates a payment request that customers can complete using various payment methods.
                The payment will be created with status 'requires_payment_method'.

                ## Allowed Payment Methods

                Control which payment methods are available to the customer:

                - **`card`**: Credit/debit card payments
                - **`spei`**: Mexican bank transfer (SPEI)
                - **`oxxo`**: OXXO convenience store payments
                - **`stripe-spei`**: Customer balance payments
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RequestPaymentInput'
                        example:
                            client:
                                id: 'client_1234567890'
                            automation_type: 'pue_invoice'
                            currency: 'MXN'
                            exchange_rate: 1.0
                            allowed_payment_methods: ['card', 'bank', 'oxxo']
                            items:
                                - id: 'service_1234567890'
                                  quantity: 1
                                  unit_price: 1000.00
                            send_email: true
                            emails: ['customer@example.com']
            responses:
                '200':
                    description: Payment request created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Payment request created successfully'
                                    data:
                                        $ref: '#/components/schemas/ApiPublicPayment'
                            example:
                                message: 'Payment request created successfully'
                                data:
                                    id: 'payment_1234567890'
                                    client:
                                        id: 'client_1234567890'
                                        name: 'Juan Pérez García'
                                        email: 'juan.perez@ejemplo.com'
                                        tax_id: 'PEGJ800101ABC'
                                    status: 'requires_payment_method'
                                    currency: 'MXN'
                                    exchange_rate: 1.0
                                    allowed_payment_methods: ['card', 'bank', 'oxxo']
                                    short_url: 'https://pay.gigstack.io/p/abc123'
                                    total: 1160.0
                                    subtotal: 1000.0
                                    taxes: 160.0
                                    discount: 0.0
                                    items:
                                        - id: 'service_1234567890'
                                          description: 'Professional consulting services'
                                          quantity: 1
                                          unit_price: 1000.0
                                          product_key: '80141503'
                                          unit_key: 'E48'
                                    emails: ['customer@example.com']
                                    created_at: 1677651234
                                    payment_processor: 'api'
                                    livemode: true
                                    team: 'team_1234567890'
                                    owner: 'user_1234567890'

    /payments/register:
        post:
            tags:
                - Payments
            summary: Register payment
            description: |
                Register a payment with optional automation for invoice creation.

                **gigstack Connect:** Register payments for other teams using the `team` parameter.

                ## Automation Types

                Control what happens automatically when registering a payment:

                - **`pue_invoice`**: Creates a PUE (Pago en Una sola Exhibición) invoice immediately
                - **`none`**: No automation, registers payment only

                ## Payment Form

                The `payment_form` field specifies the Mexican SAT payment form code:

                Common codes include: `01` (cash), `02` (check), `03` (electronic transfer), `04` (credit card), etc.

                The payment will be marked as 'succeeded' immediately upon registration.
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RegisterPaymentInput'
                        examples:
                            standard_payment:
                                summary: 'Standard payment without splitting'
                                value:
                                    client:
                                        id: 'client_1234567890'
                                    automation_type: 'pue_invoice'
                                    currency: 'MXN'
                                    exchange_rate: 1.0
                                    payment_form: '03'
                                    items:
                                        - id: 'service_1234567890'
                                          quantity: 1
                                          unit_price: 1000.00
                            percentage_split:
                                summary: 'Payment with percentage-based splitting'
                                value:
                                    client:
                                        id: 'client_1234567890'
                                    automation_type: 'pue_invoice'
                                    currency: 'MXN'
                                    payment_form: '03'
                                    items:
                                        - id: 'service_1234567890'
                                          quantity: 1
                                          unit_price: 1000.00
                                    transfer_data:
                                        master: 30
                                        connect: 'EMP800101ABC'
                                        master_to: 'client'
                                        connect_to: 'master'
                            fixed_commission:
                                summary: 'Payment with fixed commission fee'
                                description: 'Use custom_price to charge a fixed commission instead of percentage'
                                value:
                                    client:
                                        id: 'client_1234567890'
                                    automation_type: 'pue_invoice'
                                    currency: 'MXN'
                                    payment_form: '03'
                                    items:
                                        - id: 'service_1234567890'
                                          quantity: 1
                                          unit_price: 1000.00
                                    transfer_data:
                                        master: 0
                                        connect: 'EMP800101ABC'
                                        master_to: 'client'
                                        connect_to: 'master'
                                        connect_custom_config:
                                            custom_price: 50.00
                                            custom_description: 'Platform service fee'
            responses:
                '200':
                    description: Payment registered successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Payment registered successfully'
                                    data:
                                        oneOf:
                                            - $ref: '#/components/schemas/ApiPublicPayment'
                                            - type: object
                                              description: 'Split payment result'
                                              properties:
                                                  split_reference:
                                                      type: string
                                                      example: 'split_abc123xyz'
                                                  master_payment_id:
                                                      type: string
                                                      example: 'payment_master_123'
                                                  connect_payment_id:
                                                      type: string
                                                      example: 'payment_connect_456'
                                                  master_amount:
                                                      type: number
                                                      example: 696.0
                                                  connect_amount:
                                                      type: number
                                                      example: 464.0
                                                  total_amount:
                                                      type: number
                                                      example: 1160.0
                                                  master_payment:
                                                      type: object
                                                  connect_payment:
                                                      type: object
                                                  connect_team:
                                                      type: object
                                                      nullable: true
                                                      properties:
                                                          id:
                                                              type: string
                                                          tax_id:
                                                              type: string
                                                          legal_name:
                                                              type: string
                                                          is_newly_created:
                                                              type: boolean
                                                          onboarding_url:
                                                              type: string
                            examples:
                                standard_payment:
                                    summary: 'Standard payment response'
                                    value:
                                        message: 'Payment registered successfully'
                                        data:
                                            id: 'payment_1234567890'
                                            client:
                                                id: 'client_1234567890'
                                                name: 'Juan Pérez García'
                                                email: 'juan.perez@ejemplo.com'
                                                tax_id: 'PEGJ800101ABC'
                                            status: 'succeeded'
                                            currency: 'MXN'
                                            exchange_rate: 1.0
                                            payment_form: '03'
                                            total: 1160.0
                                            subtotal: 1000.0
                                            taxes: 160.0
                                            discount: 0.0
                                            items:
                                                - id: 'service_1234567890'
                                                  description: 'Professional consulting services'
                                                  quantity: 1
                                                  unit_price: 1000.0
                                                  product_key: '80141503'
                                                  unit_key: 'E48'
                                            invoices: ['invoice_1234567890']
                                            created_at: 1677651234
                                            succeeded_at: 1677651234
                                            payment_processor: 'api'
                                            livemode: true
                                            team: 'team_1234567890'
                                            owner: 'user_1234567890'
                                split_payment:
                                    summary: 'Split payment response'
                                    description: 'Response when using transfer_data to split payments'
                                    value:
                                        message: 'Split payments registered successfully'
                                        data:
                                            split_reference: 'split_abc123xyz'
                                            master_payment_id: 'payment_master_123'
                                            connect_payment_id: 'payment_connect_456'
                                            master_amount: 696.0
                                            connect_amount: 464.0
                                            total_amount: 1160.0
                                            master_payment:
                                                id: 'payment_master_123'
                                                client: 'client_1234567890'
                                                amount: 696.0
                                                team: 'team_master_123'
                                                split_role: 'master'
                                            connect_payment:
                                                id: 'payment_connect_456'
                                                client: 'client_connect_789'
                                                amount: 464.0
                                                team: 'team_connect_456'
                                                split_role: 'connect'
                                            connect_team:
                                                id: 'team_connect_456'
                                                tax_id: 'EMP800101ABC'
                                                legal_name: 'Empresa Ejemplo SA de CV'
                                                is_newly_created: true
                                                onboarding_url: 'https://api.gigstack.com/onboarding/team_connect_456?token=abc123'
                '400':
                    description: Bad Request - Invalid payment data or automation type
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'

