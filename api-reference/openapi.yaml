    /teams/{id}/sat-connection:
        post:
            tags:
                - Teams
            summary: Upload SAT CSD certificates
            description: |
                Upload SAT CSD (Certificado de Sello Digital) certificates to establish SAT connection for CFDI invoicing.

                This endpoint accepts multipart form data with the certificate files and password.

                ## Required Files
                - **cert**: Certificate file (.cer) - The public certificate
                - **key**: Private key file (.key) - The encrypted private key
                - **keyPass**: Password for the private key

                ## First-Time Connection
                When this is the first SAT connection for a team (no previous SAT setup),
                the system will automatically initialize default invoice series (G, NC, P, T).

                **gigstack Connect:** Upload SAT certificates for other teams using the `team` parameter.
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                  description: 'Team ID to upload SAT certificates for'
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                cert:
                                    type: string
                                    format: binary
                                    description: 'Certificate file (.cer)'
                                key:
                                    type: string
                                    format: binary
                                    description: 'Private key file (.key)'
                                keyPass:
                                    type: string
                                    description: 'Password for the private key'
                            required:
                                - cert
                                - key
                                - keyPass
            responses:
                '200':
                    description: SAT connection established successfully
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: '#/components/schemas/StandardSuccessResponse'
                                    - type: object
