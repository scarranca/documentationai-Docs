    /clients/csf:
        post:
            tags:
                - Clients
            summary: Upload CSF PDF to create or update client
            description: |
                Upload a CSF (Constancia de Situación Fiscal) PDF file from SAT to automatically extract fiscal information and create a new client or update an existing one.

                **How it works:**
                1. Upload the CSF PDF file as `multipart/form-data`
                2. The system extracts RFC and CIF from the PDF
                3. Validates the fiscal information against SAT
                4. Creates a new client or updates an existing one with the fiscal data

                **Query Parameters:**
                - `client_id` (optional): If provided, updates the existing client. If omitted, creates a new client.

                **Extracted Information:**
                - Legal name (Razón Social)
                - RFC (Tax ID)
                - Fiscal regime (Régimen Fiscal)
                - Fiscal type (company/individual)
                - Fiscal status
                - Complete address (street, exterior/interior number, neighborhood, city, state, zip code)

                **gigstack Connect:** Create or update clients for other teams using the `team` parameter.
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
                - name: client_id
                  in: query
                  required: false
                  schema:
                      type: string
                  description: Optional client ID to update. If not provided, creates a new client.
                  example: 'client_1234567890'
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required:
                                - file
                            properties:
                                file:
                                    type: string
                                    format: binary
                                    description: CSF PDF file from SAT
            responses:
                '200':
                    description: Client updated successfully with CSF data
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Client updated with CSF data'
                                    data:
                                        $ref: '#/components/schemas/ApiPublicClient'
                            example:
                                message: 'Client updated with CSF data'
                                data:
                                    id: 'client_1234567890'
                                    name: 'Empresa Ejemplo SA de CV'
                                    legal_name: 'Empresa Ejemplo SA de CV'
                                    tax_id: 'EEM010101ABC'
                                    rfc: 'EEM010101ABC'
                                    tax_system: '601'
                                    address:
                                        street: 'Av. Reforma'
                                        exterior: '123'
                                        neighborhood: 'Centro'
                                        city: 'Ciudad de México'
                                        state: 'CDMX'
                                        zip: '06000'
                                        country: 'MEX'
                                    is_valid: false
                                    livemode: false
                                    created_at: 1677651234
                                    team: 'team_1234567890'
                                    owner: 'user_1234567890'
                                    from: 'api'
                                    metadata:
                                        rfc: 'EEM010101ABC'
                                        fiscal_type: 'company'
                                        fiscal_status: 'Activo'
                '201':
                    description: Client created successfully from CSF
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Client created from CSF'
                                    data:
                                        $ref: '#/components/schemas/ApiPublicClient'
                            example:
                                message: 'Client created from CSF'
                                data:
                                    id: 'client_9876543210'
                                    name: 'Nueva Empresa SA de CV'
                                    legal_name: 'Nueva Empresa SA de CV'
                                    tax_id: 'NEM010101XYZ'
                                    rfc: 'NEM010101XYZ'
                                    tax_system: '601'
                                    address:
                                        street: 'Calle Principal'
                                        exterior: '456'
                                        neighborhood: 'Polanco'
                                        city: 'Ciudad de México'
                                        state: 'CDMX'
                                        zip: '11560'
                                        country: 'MEX'
                                    is_valid: false
                                    livemode: false
                                    created_at: 1677651234
                                    team: 'team_1234567890'
                                    owner: 'user_1234567890'
                                    from: 'api'
                                    metadata:
                                        rfc: 'NEM010101XYZ'
                                        fiscal_type: 'company'
                                        fiscal_status: 'Activo'
                '400':
                    description: Bad Request - Invalid file, missing fiscal data, or client not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                            examples:
                                no_file:
                                    value:
                                        message: 'Error processing CSF upload'
                                        error: 'No file uploaded'
                                invalid_pdf:
                                    value:
                                        message: 'Error processing CSF upload'
                                        error: 'Could not extract RFC or CIF from PDF'
                                missing_data:
                                    value:
                                        message: 'Error processing CSF upload'
                                        error: 'Missing required fiscal data (name or RFC)'
                                client_not_found:
                                    value:
                                        message: 'Error processing CSF upload'
                                        error: 'Client not found'
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'

