                    type: string
                    nullable: true
                    example: 'payment-register-12345'
                    description: 'Unique key to prevent duplicate payment registrations. If a payment with this key already exists, the existing payment will be returned.'
                date:
                    type: number
                    nullable: true
                    example: 1677651234000
                    description: 'Unix timestamp (in milliseconds) for when the payment was received. Must be in the past. Defaults to current time if not provided.'
