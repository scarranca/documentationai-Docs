        # Comprehensive Invoice Input Schema
        InvoiceInput:
            type: object
            required:
                - client
                - currency
                - items
                - invoice_type
                - use
                - payment_form
                - payment_method
            properties:
                client:
                    type: object
                    properties:
                        id:
                            type: string
                            nullable: true
                            example: 'client_1234567890'
                            description: 'Existing client ID'
                        search:
                            type: object
                            properties:
                                on_key:
                                    type: string
                                    example: 'tax_id'
                                    description: 'Field to search client on'
                                on_value:
                                    type: string
                                    example: 'PEGJ800101ABC'
                                    description: 'Value to search for'
                                auto_create:
                                    type: boolean
                                    example: true
                                    description: 'Create client if not found'
                                safety_check:
                                    type: boolean
                                    example: false
                                    description: 'When true, prevents using multiple matching results (returns error). When false, uses the first result found. Default: false'
                        address:
                            $ref: '#/components/schemas/ClientAddress'
                        name:
                            type: string
                            nullable: true
                            example: 'Juan Pérez García'
                        company:
                            type: string
                            nullable: true
                            example: 'Empresa SA de CV'
                        phone:
                            type: string
                            nullable: true
                            example: '+52 55 1234 5678'
                        email:
                            type: string
                            format: email
                            nullable: true
                            example: 'juan.perez@ejemplo.com'
                        bcc:
                            type: array
                            items:
                                type: string
                                format: email
                            description: 'BCC recipients for invoice emails'
                        legal_name:
                            type: string
                            nullable: true
                            example: 'Juan Pérez García'
                        tax_id:
                            type: string
                            nullable: true
                            example: 'PEGJ800101ABC'
                        use:
                            type: string
                            nullable: true
                            example: 'P01'
                        tax_system:
                            type: string
                            nullable: true
                            example: '601'
                        metadata:
                            type: object
                            additionalProperties: true
                automation:
                    $ref: '#/components/schemas/AutomationTypeEnum'
                    nullable: true
                    description: 'Automation type for this invoice'
                currency:
                    type: string
                    example: 'MXN'
                    description: 'Currency code (ISO 4217)'
                exchange_rate:
                    type: number
                    nullable: true
                    example: 1.0
                    description: 'Exchange rate to use for currency conversion'
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/ItemSchema'
                    description: 'Invoice items with full tax and third-party support'
                invoice_type:
                    type: string
                    enum: ['I', 'E', 'P', 'N']
                    example: 'I'
                    description: |
                        Invoice type:
                        - `I`: Ingreso (Income)
                        - `E`: Egreso (Expense/Credit note)
                        - `P`: Pago (Payment)
                        - `N`: Nomina (Payroll)
                use:
                    type: string
                    example: 'P01'
                    description: 'CFDI use code (c_UsoCFDI)'
                payment_form:
                    $ref: '#/components/schemas/PaymentFormEnum'
                    description: 'SAT payment form code'
                payment_method:
                    type: string
                    enum: ['PUE', 'PPD']
                    example: 'PUE'
                    description: |
                        Payment method:
                        - `PUE`: Pago en Una Exhibición (Immediate payment)
                        - `PPD`: Pago en Parcialidades o Diferido (Deferred payment)
                payment_conditions:
                    type: string
                    nullable: true
                    example: ''
                    description: 'Payment conditions text'
                export_classification:
                    type: string
                    nullable: true
                    example: '01'
                    description: 'Export classification for international transactions'
                global:
                    type: object
                    nullable: true
                    properties:
                        periodicity:
                            type: string
                            example: '04'
                            description: 'Global invoice periodicity'
                        months:
                            type: string
                            example: '01'
                            description: 'Months covered'
                        year:
                            type: number
                            example: 2024
                            description: 'Year covered'
                    description: 'Global invoice configuration for periodic invoices'
                series:
                    type: string
                    nullable: true
                    example: 'A'
                    description: 'Invoice series'
                folio:
                    type: string
                    nullable: true
                    example: '123'
                    description: 'Invoice folio number'
                addenda:
                    type: string
                    nullable: true
                    example: ''
                    description: 'Additional XML addenda'
                invoice_pdf_notes:
                    type: string
                    nullable: true
                    example: ''
                    description: 'Additional notes for PDF generation'
                related_documents:
                    type: array
                    nullable: true
                    items:
                        type: object
                        properties:
                            relationship:
                                type: string
                                example: '04'
                                description: 'Type of relationship'
                            documents:
                                type: array
                                items:
                                    type: string
                                example: ['12345678-1234-1234-1234-123456789012']
                                description: 'Related document UUIDs'
                    description: 'Related documents (for replacements, cancellations, etc.)'
                complements:
                    type: array
                    nullable: true
                    items:
                        type: object
                        properties:
                            type:
                                type: string
                                example: 'custom'
                            data:
                                type: string
                                example: '<xml>...</xml>'
                    description: 'CFDI complements (additional XML data)'
                send_email:
                    type: boolean
                    nullable: true
                    example: true
                    description: 'Whether to send invoice via email'
                emails:
                    type: array
                    nullable: true
                    items:
                        type: string
                        format: email
                    example: ['client@example.com']
                    description: 'Additional email recipients'
                metadata:
                    type: object
                    nullable: true
                    additionalProperties: true
                    description: 'Additional metadata'
                idempotency_key:
                    type: string
                    nullable: true
                    example: 'invoice-key-12345'
                    description: 'Unique key to prevent duplicate invoices'

