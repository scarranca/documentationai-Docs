                            - receipt.completed
                            - receipt.deleted
                            - customer.created
                            - customer.updated
                            - customer.deleted
                            - service.created
                            - service.updated
                            - service.deleted
                    example:
                        - payment.created
                        - payment.succeeded
                        - invoice.created
                    description: 'Array of event types to subscribe to'
                description:
                    type: string
                    nullable: true
                    example: 'Updated webhook description'
                    description: 'Optional description of the webhook purpose'
                status:
