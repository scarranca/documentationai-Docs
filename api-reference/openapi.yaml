                                                      type: boolean
                                                      example: true
                                                  details:
                                                      type: object
                                                      properties:
                                                          serialNumber:
                                                              type: string
                                                              example: '30001000000500003416'
                                                          validTo:
                                                              type: number
                                                              example: 1735689600000
                                          message:
                                              example: 'SAT connection established successfully'
                '400':
                    description: Bad Request - Missing files or invalid certificate
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                '403':
                    description: Forbidden - Team not in same billing account
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '404':
                    description: Team not found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'

    /teams/{id}/manifest/sign:
        post:
            tags:
                - Teams
            summary: Sign manifest document
            description: |
                Signs a manifest document (Carta Manifiesto) using the FIEL (Firma Electrónica Avanzada) for SAT compliance.

                This endpoint is used to sign the authorization manifest that authorizes the PAC (Proveedor Autorizado de Certificación)
                to issue CFDI invoices on behalf of your team's RFC. The manifest must be signed to grant the PAC permission to stamp
                and process invoices under your team's tax identification.

                **Important Notes:**
                - Your SAT configuration must be completed before signing the manifest
                - The FIEL certificate must be valid and issued by SAT
                - The certificate must match your team's RFC
                - Once signed, the manifest is stored in your team's SAT configuration
                - The manifest includes both XML and PDF files

                **Supported Formats:**

                1. **JSON format (application/json):**
                   - Send Base64 encoded certificate files
                   - Useful for API integrations

                2. **Form Data format (multipart/form-data):**
                   - Upload certificate files directly
                   - Useful for web form submissions

                **Note:** The `team` and `livemode` parameters are automatically extracted from your JWT token and applied to the request.
                You do not need to include these fields in the request body.
            security:
                - apiKey: []
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                  description: 'Team ID to sign manifest for'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - key
                                - cert
                                - password
                            properties:
                                key:
                                    type: string
                                    format: byte
                                    description: 'Base64 encoded FIEL .key file'
                                    example: 'MIIFDjBABgkqhkiG9w0BBQ0wMz...'
                                cert:
                                    type: string
                                    format: byte
                                    description: 'Base64 encoded FIEL .cer file'
                                    example: 'MIIFuzCCA6OgAwIBAgIUMzAwMD...'
                                password:
                                    type: string
                                    format: password
                                    description: 'FIEL password (private key password)'
                                    example: 'my_secure_password'
                        examples:
                            basic:
                                summary: Basic manifest signing request
                                value:
                                    key: 'MIIFDjBABgkqhkiG9w0BBQ0wMz...'
                                    cert: 'MIIFuzCCA6OgAwIBAgIUMzAwMD...'
                                    password: 'my_secure_password'
                    multipart/form-data:
                        schema:
                            type: object
                            required:
                                - key
                                - cert
                                - password
                            properties:
                                key:
                                    type: string
                                    format: binary
                                    description: 'FIEL .key file upload'
                                cert:
                                    type: string
                                    format: binary
                                    description: 'FIEL .cer file upload'
                                password:
                                    type: string
                                    description: 'FIEL password (private key password)'
            responses:
                '200':
                    description: Manifest signed successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Manifest signed successfully'
                                    data:
                                        type: object
                                        properties:
                                            xmlBase64:
                                                type: string
                                                format: byte
                                                description: 'Base64 encoded signed manifest XML'
                                            pdfBase64:
                                                type: string
                                                format: byte
                                                description: 'Base64 encoded manifest PDF'
                                            fechaFirma:
                                                type: string
                                                format: date-time
                                                description: 'Signature date and time'
                                                example: '2024-01-08T15:30:00.000Z'
                                            mensajeResultado:
                                                type: string
                                                description: 'Result message from signing service'
                                                example: 'Firma exitosa'
                            examples:
                                success:
                                    summary: Successful manifest signing
                                    value:
                                        message: 'Manifest signed successfully'
                                        data:
                                            xmlBase64: 'PD94bWwgdmVyc2lvbj0iMS4wIi...'
                                            pdfBase64: 'JVBERi0xLjQKJeLjz9MKMyAwIG...'
