security:
    - apiKey: []

components:
    securitySchemes:
        apiKey:
            type: apiKey
            in: header
            name: Authorization
            description: |
                **Authentication Method:** API Key in Authorization Header

                Include your JWT token in the Authorization header with Bearer prefix.

                **Header Format:** `Authorization: Bearer YOUR_JWT_TOKEN`

                **Example:** `Authorization: Bearer eyJ0eXAiOiAiSldUIiwgImFsZyI6ICJSUzI1NiJ9...`

                **Get your token at:** [app.gigstack.pro/settings?tab=api](https://app.gigstack.pro/settings?tab=api)

                **Note:** Only the Authorization header with your JWT token is required. Include the "Bearer " prefix before your token.

    parameters:
        TeamParameter:
            name: team
            in: query
            schema:
                type: string
            description: |
                **gigstack Connect:** Target team ID for multi-team access.

                Requires gigstack Connect enabled on your team and shared billing account.

                **Example:** `?team=team_xyz789`

        LimitParam:
            name: limit
            in: query
            description: Maximum number of items to return (default 50, max 100)
            required: false
            schema:
                type: integer
                minimum: 1
                maximum: 100
                default: 50

        NextParam:
            name: next
            in: query
            description: Pagination cursor for the next page of results
            required: false
            schema:
                type: string
                nullable: true

        # Sorting parameters
        OrderByParam:
            name: order_by
            in: query
            description: Field name to order results by
            required: false
            schema:
                type: string
                enum: ['name', 'timestamp']
                default: 'timestamp'

        SortParam:
            name: sort
            in: query
            description: Sort direction for the results
            required: false
            schema:
                $ref: '#/components/schemas/OrderDirection'

        # Filtering parameters - Date range filters (use Unix timestamps in seconds or ISO 8601 date strings)
        CreatedGteParam:
            name: created[gte]
            in: query
            description: Filter results created on or after this timestamp. Accepts Unix timestamp in seconds (e.g., 1733011200), milliseconds (e.g., 1733011200000), or ISO 8601 date string (e.g., 2024-12-01).
            required: false
            schema:
                oneOf:
                    - type: integer
                      format: int64
                    - type: string
                      format: date
            example: 1733011200

        CreatedGtParam:
            name: created[gt]
            in: query
            description: Filter results created after this timestamp. Accepts Unix timestamp in seconds (e.g., 1733011200), milliseconds (e.g., 1733011200000), or ISO 8601 date string (e.g., 2024-12-01).
            required: false
            schema:
                oneOf:
                    - type: integer
                      format: int64
                    - type: string
                      format: date
            example: 1733011200

        CreatedLteParam:
            name: created[lte]
            in: query
            description: Filter results created on or before this timestamp. Accepts Unix timestamp in seconds (e.g., 1735689599), milliseconds (e.g., 1735689599000), or ISO 8601 date string (e.g., 2024-12-31).
            required: false
            schema:
                oneOf:
                    - type: integer
                      format: int64
                    - type: string
                      format: date
            example: 1735689599

        CreatedLtParam:
            name: created[lt]
            in: query
            description: Filter results created before this timestamp. Accepts Unix timestamp in seconds (e.g., 1735689599), milliseconds (e.g., 1735689599000), or ISO 8601 date string (e.g., 2024-12-31).
            required: false
            schema:
                oneOf:
                    - type: integer
                      format: int64
                    - type: string
                      format: date
            example: 1735689599

        FieldsParam:
            name: fields
            in: query
            description: Comma-separated list of fields to include in the response
            required: false
            style: form
            explode: false
            schema:
                type: array
                items:
                    type: string
            example: 'id,description,created_at'

        # Payment-specific filter parameters
        PaymentStatusParam:
            name: status
            in: query
            description: Filter payments by status
            required: false
            schema:
                type: string
                enum: [requires_payment_method, succeeded, canceled]

        PaymentCurrencyParam:
            name: currency
            in: query
            description: Filter payments by currency code (e.g., MXN, USD)
            required: false
            schema:
                type: string

        PaymentClientIdParam:
            name: client_id
            in: query
            description: Filter payments by client ID
            required: false
            schema:
                type: string

        PaymentEmailParam:
            name: email
            in: query
            description: Filter payments by client email address
            required: false
            schema:
                type: string

        PaymentTaxIdParam:
            name: tax_id
            in: query
            description: Filter payments by client tax ID (RFC)
            required: false
            schema:
                type: string

        PaymentClientNameParam:
            name: client_name
            in: query
            description: Filter payments by client name
            required: false
            schema:
                type: string

        PaymentAmountParam:
            name: amount
            in: query
            description: Filter payments by amount
            required: false
            schema:
                type: number

        # Search-specific parameters
        SearchQueryParam:
            name: q
            in: query
            description: |
                Search query text (primary parameter). Searches across relevant fields depending on the collection
                (e.g., client name, email, payment ID, description, metadata). The `query` parameter is also accepted
                as a backward-compatible alternative.
            required: true
            schema:
                type: string

        SearchQueryBackwardCompatParam:
            name: query
            in: query
            description: Alternative to `q`, kept for backward compatibility. If both are provided, `q` takes precedence.
            required: false
            schema:
                type: string

        SearchPageParam:
            name: page
            in: query
            description: Page number for pagination (default 1)
            required: false
            schema:
                type: integer
                minimum: 1
                default: 1

    schemas:
        OrderDirection:
            type: string
            enum: [asc, desc]
            description: Sort direction for list queries

        # Common response wrapper for list endpoints
        ListQueryParams:
            type: object
            description: Common query parameters for list endpoints
            properties:
                limit:
                    type: integer
                    minimum: 1
                    maximum: 100
                    default: 50
                next:
                    type: string
                    nullable: true
                order_by:
                    type: string
                    enum: ['name', 'timestamp']
                    default: 'timestamp'
                sort:
                    $ref: '#/components/schemas/OrderDirection'
                gte:
                    type: integer
                    format: int64
                    description: Filter results created on or after this Unix timestamp (seconds)
                lte:
                    type: integer
                    format: int64
                    description: Filter results created on or before this Unix timestamp (seconds)
                gt:
                    type: integer
                    format: int64
                    description: Filter results created after this Unix timestamp (seconds)
                lt:
                    type: integer
                    format: int64
                    description: Filter results created before this Unix timestamp (seconds)
                query:
                    type: string
                fields:
                    type: array
                    items:
                        type: string

        # Pagination metadata for responses
        PaginationMeta:
            type: object
            required: [limit, has_more]
            properties:
                limit:
                    type: integer
                    description: Number of items per page
                has_more:
                    type: boolean
                    description: Whether there are more items available
                next:
                    type: string
                    nullable: true
                    description: Cursor for the next page (null if no more pages)
                total:
                    type: integer
                    nullable: true
                    description: Total number of items (may be null for performance reasons)

        # API Response Schemas
        ApiPublicClient:
            type: object
            required:
                - id
                - email
                - from
                - livemode
                - owner
                - team
                - created_at
            properties:
                id:
                    type: string
                    example: 'client_1234567890'
                    description: 'Unique client identifier'
                address:
                    $ref: '#/components/schemas/ClientAddress'
                name:
                    type: string
                    nullable: true
                    example: 'Juan Pérez García'
                    description: 'Client name'
                company:
                    type: string
                    nullable: true
                    example: 'Empresa SA de CV'
                    description: 'Client company name'
                phone:
                    type: string
                    nullable: true
                    example: '+52 55 1234 5678'
                    description: 'Client phone number'
                email:
                    type: string
                    format: email
                    nullable: true
                    example: 'juan.perez@ejemplo.com'
                    description: 'Client email address'
                bcc:
                    type: array
                    items:
                        type: string
                        format: email
                    nullable: true
                    example: ['admin@empresa.com']
                    description: 'BCC email addresses for client communications'
                metadata:
                    type: object
                    additionalProperties: true
                    nullable: true
                    example: { 'custom_field': 'value' }
                    description: 'Additional metadata for the client'
                is_valid:
                    type: boolean
                    nullable: true
                    example: true
                    description: 'Whether the client data is valid'
                from:
                    type: string
                    example: 'api'
                    description: 'Source of client creation'
                legal_name:
                    type: string
                    nullable: true
                    example: 'Juan Pérez García'
                    description: 'Legal name for tax purposes'
                livemode:
                    type: boolean
                    example: true
                    description: 'Whether this client is in live mode'
                owner:
                    type: string
                    example: 'user_1234567890'
                    description: 'User ID who owns this client'
                tax_id:
                    type: string
                    nullable: true
                    example: 'PEGJ800101ABC'
                    description: 'RFC (Tax ID) for Mexican tax compliance'
                use:
                    type: string
                    nullable: true
                    example: 'P01'
                    description: 'CFDI use code'
                tax_system:
                    type: string
                    nullable: true
                    example: '601'
                    description: 'SAT tax system code'
                team:
                    type: string
                    example: 'team_1234567890'
                    description: 'Team ID this client belongs to'
                created_at:
                    type: number
                    example: 1677651234
                    description: 'Unix timestamp of client creation'
                efos:
                    type: object
                    nullable: true
                    properties:
                        is_valid:
                            type: boolean
                            nullable: true
                            example: true
                            description: 'Whether the client is valid according to SAT EFOS list'
                    description: 'EFOS (SAT blacklist) validation status'
                defaults:
                    type: object
                    nullable: true
                    properties:
                        keep_full_legal_name:
                            type: boolean
                            nullable: true
                            example: false
                            description: 'Keep full legal name in documents'
                        issue_automatic_invoices:
                            type: boolean
                            nullable: true
                            example: false
                            description: 'Issue automatic invoices'
                        issue_invoiceable_receipts:
                            type: boolean
                            nullable: true
                            example: true
                            description: 'Issue invoiceable receipts'
                    description: 'Client default settings'

        # Legacy alias for backward compatibility
        Client:
            $ref: '#/components/schemas/ApiPublicClient'

        ApiPublicService:
            type: object
            required:
                - team
                - created_at
            properties:
                id:
                    type: string
                    nullable: true
                    example: 'service_1234567890'
                    description: 'Unique service identifier'
                description:
                    type: string
                    nullable: true
                    example: 'Consulting services'
                    description: 'Service description'
                from:
                    type: string
                    nullable: true
                    example: 'api'
                    description: 'Source of service creation'
                sku:
                    type: string
                    nullable: true
                    example: 'CONS-001'
                    description: 'Stock Keeping Unit identifier'
                product_key:
                    type: string
                    nullable: true
                    example: '80141503'
                    description: 'SAT product key for tax compliance'
                unit_key:
                    type: string
                    nullable: true
                    example: 'E48'
                    description: 'SAT unit key for tax compliance'
                unit_name:
                    type: string
                    nullable: true
                    example: 'Servicio'
                    description: 'Unit name for the service'
                unit_price:
                    type: number
                    nullable: true
                    example: 1000.00
                    description: 'Price per unit'
                taxes:
                    type: array
                    items:
                        $ref: '#/components/schemas/TaxElement'
                    nullable: true
                    description: 'Tax configuration for this service'
                team:
                    type: string
                    example: 'team_1234567890'
                    description: 'Team ID this service belongs to'
                created_at:
                    type: number
                    example: 1677651234
                    description: 'Unix timestamp of service creation'
                quantity:
                    type: number
                    nullable: true
                    example: 1
                    description: 'Quantity (used in transactions)'

        # Legacy alias for backward compatibility
        Service:
            $ref: '#/components/schemas/ApiPublicService'

        ClientInput:
            type: object
            required:
                - name
                - email
            properties:
                address:
                    type: object
                    nullable: true
                    properties:
                        country:
                            type: string
                            nullable: true
                            example: 'MEX'
                        street:
                            type: string
                            nullable: true
                            example: 'Av. Insurgentes Sur'
                        zip:
                            type: string
                            nullable: true
                            example: '03100'
                        city:
                            type: string
                            nullable: true
                            example: 'Ciudad de México'
                        state:
                            type: string
                            nullable: true
                            example: 'CDMX'
                        exterior:
                            type: string
                            nullable: true
                            example: '123'
                        interior:
                            type: string
                            nullable: true
                            example: '4B'
                        municipality:
                            type: string
                            nullable: true
                            example: 'Benito Juárez'
                        neighborhood:
                            type: string
                            nullable: true
                            example: 'Del Valle'
                name:
                    type: string
                    example: 'Juan Pérez García'
                company:
                    type: string
                    nullable: true
                    example: 'Empresa SA de CV'
                phone:
                    type: string
                    nullable: true
                    example: '+52 55 1234 5678'
                email:
                    type: string
                    format: email
                    nullable: true
                    example: 'juan.perez@ejemplo.com'
                bcc:
                    type: array
                    items:
                        type: string
                        format: email
                    example: ['admin@empresa.com']
                metadata:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: { 'custom_field': 'value' }
                legal_name:
                    type: string
                    nullable: true
                    example: 'Juan Pérez García'
                tax_id:
                    type: string
                    nullable: true
                    example: 'PEGJ800101ABC'
                use:
                    type: string
                    nullable: true
                    example: 'P01'
                tax_system:
                    type: string
                    nullable: true
                    example: '601'
                defaults:
                    type: object
                    properties:
                        keep_full_legal_name:
                            type: boolean
                            example: false
                        issue_automatic_invoices:
                            type: boolean
                            example: false
                        issue_invoiceable_receipts:
                            type: boolean
                            example: true
                search:
                    type: object
                    nullable: true
                    description: |
                        Search for an existing client before creating. If a match is found, the existing client is returned (or updated if `update: true`).
                        This enables upsert-like behavior to avoid duplicate clients.
                    properties:
                        on_key:
                            type: string
                            description: The field to search on (e.g., 'tax_id', 'email', 'name')
                            example: 'tax_id'
                        on_value:
                            type: string
                            description: The value to match against the specified field
                            example: 'PEGJ800101ABC'
                        update:
                            type: boolean
                            description: If true and a match is found, update the existing client with the provided data. If false, return the existing client without modifications.
                            example: false

        ServiceInput:
            type: object
            properties:
                description:
                    type: string
                    nullable: true
                    example: 'Consulting services'
                sku:
                    type: string
                    nullable: true
                    example: 'CONS-001'
                product_key:
                    type: string
                    nullable: true
                    example: '80141503'
                unit_key:
                    type: string
                    nullable: true
                    example: 'E48'
                unit_name:
                    type: string
                    nullable: true
                    example: 'Servicio'
                unit_price:
                    type: number
                    nullable: true
                    example: 1000.00
                taxes:
                    type: array
                    items:
                        type: object
                        properties:
                            base:
                                oneOf:
                                    - type: number
                                    - type: string
                                nullable: true
                                description: 'Taxable base amount. Accepts number or numeric string. If null, calculated automatically from item price.'
                                example: 100
                            factor:
                                type: string
                                nullable: true
                                example: 'Tasa'
                            inclusive:
                                type: boolean
                                nullable: true
                                example: false
                            rate:
                                type: number
                                nullable: true
                                example: 0.16
                            type:
                                type: string
                                enum: ['IVA', 'ISR', 'IEPS']
                                nullable: true
                                example: 'IVA'
                            withholding:
                                type: boolean
                                nullable: true
                                example: false

        # CFDI Error Schemas
        CfdiError:
            type: object
            required:
                - code
                - description
                - explanation
                - solution
                - type
            properties:
                code:
                    type: string
                    description: Unique CFDI error code identifier
                    example: CFDI140223
                description:
                    type: string
                    description: Brief description of the error (typically in Spanish as provided by SAT)
                    example: El campo Rfc del receptor no es valido
                explanation:
                    type: string
                    description: Detailed explanation of why this error occurs
                    example: The RFC (tax ID) provided for the receiver does not meet the validation requirements or format specified by SAT
                solution:
                    type: string
                    description: Actionable steps to resolve the error
                    example: Verify that the receiver's RFC is correct, properly formatted (13 characters for individuals, 12 for legal entities), and matches SAT's registered information
                type:
                    type: string
                    enum:
                        - invoice
                        - receiver
                        - sender
                        - unknown
                    description: Category of the error
                    example: receiver

        # Invoice Schemas
        Invoice:
            type: object
            properties:
                uuid:
                    type: string
                    example: 'invoice_1234567890'
                    description: 'Unique invoice identifier'
                idempotency_key:
                    type: string
                    nullable: true
                    example: 'unique_key_123'
                    description: 'Idempotency key used when creating the invoice'
                client:
                    $ref: '#/components/schemas/ApiPublicClient'
                created_at:
                    type: number
