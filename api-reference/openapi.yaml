    /users/login-link:
        post:
            tags:
                - Users
            summary: Generate login link
            description: |
                Generate a login link for a user. The link contains a custom Firebase token that allows the user to authenticate directly.

                **Requirements:**
                - User must have been created via API (`from: 'api'`)
                - User must belong to the billing account making the request

                If requirements are not met, returns a 404 error.

                **gigstack Connect:** Generate login links for other teams' users using the `team` parameter.
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - user_id
                            properties:
                                user_id:
                                    type: string
                                    description: The Firebase UID of the user
                                    example: 'abc123xyz'
            responses:
                '200':
                    description: Login link generated successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: object
                                        properties:
                                            login_link:
                                                type: string
                                                description: The login URL with embedded token
                                                example: 'https://app.gigstack.pro/auth/token-login?token=eyJhbGc...'
                                            valid_until:
                                                type: number
                                                description: Unix timestamp (ms) when the token expires (1 hour from generation)
                                                example: 1732657200000
                                            method:
                                                type: string
                                                description: The authentication method used
                                                enum: [token]
                                                example: 'token'
                                    message:
                                        type: string
                                        example: 'Login link generated'
                '404':
                    description: User not found or not accessible via API
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'

