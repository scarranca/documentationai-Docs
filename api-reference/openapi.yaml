                                        type: string
                                        nullable: true
                                        example: '03100'
                payment_form:
                    type: string
                    enum:
                        [
                            '01',
                            '02',
                            '03',
                            '04',
                            '05',
                            '06',
                            '08',
                            '12',
                            '13',
                            '14',
                            '15',
                            '17',
                            '23',
                            '24',
                            '25',
                            '26',
                            '27',
                            '28',
                            '29',
                            '30',
                            '31',
                            '99',
                        ]
                    example: '03'
                    description: |
                        Mexican SAT payment form code:
                        - `01`: Cash
                        - `02`: Check
                        - `03`: Electronic transfer
                        - `04`: Credit card
                        - `05`: Electronic money
                        - `06`: Digital money
                        - `08`: Gift voucher
                        - `12`: Credit for unregistered bills
                        - `13`: Payment by subrogation
                        - `14`: Payment by consignment
                        - `15`: Condonation
                        - `17`: Compensation
                        - `23`: Novation
                        - `24`: Confusion
                        - `25`: Remission of debt
                        - `26`: Prescription or expiration
                        - `27`: To creditor's satisfaction
                        - `28`: Credit card
                        - `29`: Debit card
                        - `30`: Service card
                        - `31`: Applicable only to the complementary concept of donations
                        - `99`: To be defined
                metadata:
                    type: object
                    nullable: true
                    additionalProperties: true
                    description: 'Additional metadata to store with the payment'
