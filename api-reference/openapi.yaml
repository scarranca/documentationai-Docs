    /clients/search:
        get:
            tags:
                - Clients
            summary: Search clients
            description: |
                Full-text search across clients using Typesense. Provides fast, typo-tolerant search capabilities.

                **gigstack Connect:** Access other teams' clients using the `team` parameter.

                **Search Capabilities:**
                - Search across client name, email, tax ID, legal name, and metadata
                - Typo-tolerant fuzzy matching
                - Paginated results

                **Requirements:**
                - Typesense must be configured for your team
                - The `q` (or `query`) parameter is required

            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
                - $ref: '#/components/parameters/SearchQueryParam'
                - $ref: '#/components/parameters/SearchQueryBackwardCompatParam'
                - $ref: '#/components/parameters/LimitParam'
                - $ref: '#/components/parameters/SearchPageParam'
                - $ref: '#/components/parameters/FieldsParam'

            responses:
                '200':
                    description: Clients searched successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - message
                                    - data
                                    - found
                                    - page
                                    - per_page
                                    - success
                                    - timestamp
                                properties:
                                    message:
                                        type: string
                                        example: 'Clients searched successfully'
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/ApiPublicClient'
                                    found:
                                        type: integer
                                        description: Total number of results found
                                        example: 15
                                    page:
                                        type: integer
                                        description: Current page number
                                        example: 1
                                    per_page:
                                        type: integer
                                        description: Number of results per page
                                        example: 10
                                    success:
                                        type: boolean
                                        example: true
                                    timestamp:
                                        type: number
                                        format: int64
                                        description: Unix timestamp in milliseconds
                                        example: 1677651234000
                '400':
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                            examples:
                                missing_query:
