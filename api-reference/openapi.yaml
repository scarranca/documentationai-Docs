openapi: 3.0.3
info:
    title: Gigstack API v2
    description: |
        # gigstack API v2

        Comprehensive API for invoice, payment, client, and service management with **Mexican tax compliance (SAT)**.

        ## 🚀 Getting Started

        1. **Get your token** at [app.gigstack.pro/settings?tab=api](https://app.gigstack.pro/settings?tab=api)
        2. **Include in header:** `Authorization: Bearer YOUR_TOKEN`
        3. **Base URL:** `https://api.gigstack.io/v2`

        ## 📋 Key Features

        - **Mexican Tax Compliance** (SAT, RFC, CFDI)
        - **Full Invoice Lifecycle** (creation, stamping, cancellation)
        - **Payment Processing** (multiple processors, refunds)
        - **Client Management** (fiscal validation, EFOS)
        - **Service Catalog** (products with tax configurations)
        - **Team & User Management**

        ## 📄 Response Format

        All successful responses follow this format:
        ```json
        {
          "message": "Description of action",
          "data": {} // Response data
        }
        ```

        List responses include pagination:
        ```json
        {
          "message": "Items retrieved successfully",
          "data": [...],
          "next": "cursor_for_next_page",
          "has_more": true,
          "total_results": 150
        }
        ```

        Error responses use this format:
        ```json
        {
          "message": "Error description",
          "error": "Specific error details"
        }
        ```

        ## 🔒 Authentication

        **Simple Bearer Token Authentication**

        All endpoints require ONLY a Bearer token in the Authorization header:

        ```
        Authorization: Bearer YOUR_TOKEN
        ```

        **No additional authentication required:**
        - ❌ No private keys needed
        - ❌ No payload signatures required  
        - ❌ No additional headers needed
        - ✅ Just the Authorization header with your Bearer token

        **Important:** The `team` and `livemode` parameters are automatically extracted from your JWT token and applied to all requests. You do not need to include these fields in request bodies - they are handled automatically by the API.

        ## 🔗 gigstack Connect

        gigstack Connect allows authorized teams to access resources across multiple teams within the same billing account.

        ### How to Use gigstack Connect

        Add the `team` query parameter to **ANY ENDPOINT** to access another team's resources:

        ```bash
        # Access team_xyz789's clients
        GET /clients?team=team_xyz789&limit=10

        # Create invoice for team_abc123
        POST /invoices?team=team_abc123

        # Update service in team_def456
        PUT /services/service_456?team=team_def456
        ```

        ### Requirements

        - Your API key must belong to a team with gigstack Connect enabled
        - Target team must share the same billing account
        - Target team must exist

        ### Error Responses

        - `401 Unauthorized, not a master team` - Your team doesn't have gigstack Connect enabled
        - `404 Team not found` - Target team doesn't exist
        - `401 Unauthorized, no matched teams` - Teams don't share the same billing account

        ### Global Availability

        The `team` parameter is available on **ALL 35+ endpoints** in this API for seamless multi-team management.

        ## 📚 Common Use Cases

        - **Create Invoice:** `POST /invoices` with client and items
        - **Process Payment:** `POST /payments` then `POST /payments/{id}/paid`
        - **Manage Clients:** `POST /clients` with fiscal information
        - **SAT Compliance:** Use proper tax codes and validation
        - **gigstack Connect:** Use `?team=target_team_id` for multi-team management

        ## 📱 iOS & Mobile Development

        ### Swift Integration

        The gigstack API is fully compatible with iOS development using URLSession or networking libraries like Alamofire.

        **Basic Swift Example:**
        ```swift
        import Foundation

        struct GigstackAPI {
            static let baseURL = "https://api.gigstack.io/v2"
            static let token = "YOUR_BEARER_TOKEN"

            static func makeRequest<T: Codable>(
                endpoint: String,
                method: String = "GET",
                body: [String: Any]? = nil,
                responseType: T.Type
            ) async throws -> T {
                var request = URLRequest(url: URL(string: "\(baseURL)\(endpoint)")!)
                request.httpMethod = method
                request.setValue("Bearer \(token)", forHTTPHeaderField: "Authorization")
                request.setValue("application/json", forHTTPHeaderField: "Content-Type")

                if let body = body {
                    request.httpBody = try JSONSerialization.data(withJSONObject: body)
                }

                let (data, _) = try await URLSession.shared.data(for: request)
                return try JSONDecoder().decode(responseType, from: data)
            }
        }
        ```

        ### Key iOS Considerations

        - **HTTPS Only**: All requests must use HTTPS (already enforced)
        - **JSON Content-Type**: Always set `Content-Type: application/json`
        - **Authorization Header**: Include `Authorization: Bearer YOUR_TOKEN`
        - **Error Handling**: Parse JSON error responses for user-friendly messages
        - **Networking**: Compatible with URLSession, Alamofire, or any HTTP client
        - **Background Tasks**: API calls work with background URL sessions

        ### iOS Response Models

        Create Codable structs matching the API response schemas:

        ```swift
        struct APIResponse<T: Codable>: Codable {
            let message: String
            let data: T
            let next: String?
            let hasMore: Bool?
            let totalResults: Int?

            enum CodingKeys: String, CodingKey {
                case message, data, next
                case hasMore = "has_more"
                case totalResults = "total_results"
            }
        }

        struct Client: Codable {
            let id: String
            let name: String?
            let email: String?
            let company: String?
            let taxId: String?
            let createdAt: Int

            enum CodingKeys: String, CodingKey {
                case id, name, email, company
                case taxId = "tax_id"
                case createdAt = "created_at"
            }
        }
        ```

        ### Android/Kotlin Integration

        **Basic Kotlin Example with OkHttp:**
        ```kotlin
        import okhttp3.*
        import kotlinx.serialization.json.Json
        import kotlinx.coroutines.Dispatchers
        import kotlinx.coroutines.withContext

        class GigstackAPI {
            companion object {
                private const val BASE_URL = "https://api.gigstack.io/v2"
                private const val TOKEN = "YOUR_BEARER_TOKEN"
                private val client = OkHttpClient()
                private val json = Json { ignoreUnknownKeys = true }
            }

            suspend fun <T> makeRequest(
                endpoint: String,
                method: String = "GET",
                body: RequestBody? = null,
                responseClass: Class<T>
            ): T = withContext(Dispatchers.IO) {
                val request = Request.Builder()
                    .url("$BASE_URL$endpoint")
                    .method(method, body)
                    .addHeader("Authorization", "Bearer $TOKEN")
                    .addHeader("Content-Type", "application/json")
                    .build()

                val response = client.newCall(request).execute()
                val responseBody = response.body?.string() ?: ""
                json.decodeFromString(responseClass, responseBody)
            }
        }
        ```
