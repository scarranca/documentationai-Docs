    /invoices/errors:
        get:
            tags:
                - Invoices
            summary: List CFDI errors
            description: |
                Retrieve a paginated and filterable list of CFDI errors from the error matrix.
                Use this endpoint to search for error codes, understand error causes, and find solutions.

                **Query Options:**
                - Filter by exact error code using `code` parameter
                - Search across all fields using `q` parameter
                - Filter by error type (invoice, receiver, sender, unknown)
                - Paginate results with `limit` and `page` parameters
            security:
                - apiKey: []
            parameters:
                - name: code
                  in: query
                  description: Filter by exact error code (e.g., CFDI140223). Returns single document if found.
                  required: false
                  schema:
                      type: string
                  example: CFDI140223
                - name: q
                  in: query
                  description: Search query. Searches across code, description, explanation, and solution fields.
                  required: false
                  schema:
                      type: string
                  example: RFC
                - name: type
                  in: query
                  description: Filter by error type
                  required: false
                  schema:
                      type: string
                      enum:
                          - invoice
                          - receiver
                          - sender
                          - unknown
                  example: receiver
                - name: limit
                  in: query
                  description: Number of results per page (max 100)
                  required: false
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 100
                      default: 50
                  example: 50
                - name: page
                  in: query
                  description: Page number for pagination
                  required: false
                  schema:
                      type: integer
                      minimum: 1
                      default: 1
                  example: 1

            responses:
                '200':
                    description: CFDI errors retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - success
                                    - data
                                    - total
                                    - page
                                    - limit
                                    - message
                                    - timestamp
                                properties:
                                    success:
                                        type: boolean
                                        example: true
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/CfdiError'
                                    total:
                                        type: integer
                                        description: Total count of matching errors
                                        example: 150
                                    page:
                                        type: integer
                                        description: Current page number
                                        example: 1
                                    limit:
                                        type: integer
                                        description: Items per page
                                        example: 50
                                    message:
                                        type: string
                                        example: CFDI errors retrieved successfully
                                    timestamp:
                                        type: number
                                        format: int64
                                        description: Unix timestamp in milliseconds
                                        example: 1734605400000
                            examples:
                                singleError:
                                    summary: Single error by code
                                    value:
                                        success: true
                                        data:
                                            - code: CFDI140223
                                              description: El campo Rfc del receptor no es valido
                                              explanation: The RFC (tax ID) provided for the receiver does not meet the validation requirements or format specified by SAT
                                              solution: Verify that the receiver's RFC is correct, properly formatted (13 characters for individuals, 12 for legal entities), and matches SAT's registered information
                                              type: receiver
                                        total: 1
                                        page: 1
                                        limit: 1
                                        message: CFDI error retrieved successfully
                                        timestamp: '2025-12-19T10:30:00.000Z'
                                searchResults:
                                    summary: Search results
                                    value:
                                        success: true
                                        data:
                                            - code: CFDI140223
                                              description: El campo Rfc del receptor no es valido
                                              explanation: The RFC (tax ID) provided for the receiver does not meet the validation requirements
                                              solution: Verify that the receiver's RFC is correct and properly formatted
                                              type: receiver
                                            - code: CFDI140225
                                              description: El RFC del receptor no existe en el padron del SAT
                                              explanation: The receiver's RFC is not registered in SAT's taxpayer registry
                                              solution: Confirm the RFC is registered with SAT or contact the receiver to verify their tax information
                                              type: receiver
                                        total: 2
                                        page: 1
                                        limit: 10
                                        message: CFDI errors retrieved successfully
                                        timestamp: '2025-12-19T10:30:00.000Z'
                '404':
                    description: Error code not found
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    message:
                                        type: string
                                        example: CFDI Error not found
                                    error:
                                        type: string
                                        example: Error code 'INVALID_CODE' not found
                                    timestamp:
                                        type: number
                                        format: int64
                                        description: Unix timestamp in milliseconds
                                        example: 1734605400000
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'

