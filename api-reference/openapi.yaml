                        folio:
                            type: number
                            nullable: true
                            example: 123
                            description: 'Invoice folio number. If null or not provided, uses automatic incrementing folio. Note: when provided, duplicates may occur.'
                transfer_data:
                    type: object
                    nullable: true
                    description: |
                        Configuration for splitting payments between master and connect teams in a marketplace.
                        Only available for master teams with marketplace-enabled billing accounts.
                    properties:
                        master:
                            type: number
                            minimum: 0
                            maximum: 100
                            example: 10
                            description: 'Percentage of the payment for the master team (0-100)'
                        connect:
                            type: string
                            example: 'ABC123456789'
                            description: 'Tax ID (RFC) or Team ID of the connect team. If not found, a new team will be created.'
                        master_to:
                            type: string
                            enum: ['client', 'connect']
                            example: 'client'
                            description: |
                                Determines which client to assign to the master payment:
                                - `client`: Use the original client from the request
                                - `connect`: Create the connect team as a client for the master payment
                        connect_to:
                            type: string
                            enum: ['client', 'master']
                            example: 'client'
                            description: |
                                Determines which client to assign to the connect payment:
                                - `client`: Use the original client from the request
                                - `master`: Create the master team as a client for the connect payment
                        connect_custom_config:
                            type: object
                            nullable: true
                            description: 'Optional configuration to customize items in the connect payment'
                            properties:
                                product_key:
                                    type: string
                                    example: '01010101'
                                    description: 'SAT product key to use for connect payment items'
                                unit_key:
                                    type: string
                                    example: 'E48'
                                    description: 'SAT unit key to use for connect payment items'
                                custom_description:
                                    type: string
                                    example: 'Professional consulting services'
                                    description: 'Custom description for connect payment items'
                                custom_price:
                                    type: number
                                    example: 250.00
                                    description: 'Fixed amount for connect payment (overrides percentage calculation). When set, connect gets this exact amount and master gets the remainder.'
                                taxes:
                                    type: array
                                    description: 'Custom tax configuration for connect payment items (uses same schema as regular item taxes)'
                                    items:
                                        type: object
                                        required:
                                            - type
                                            - rate
                                            - withholding
                                        properties:
                                            type:
                                                type: string
                                                enum: ['IVA', 'ISR', 'IEPS']
                                                example: 'IVA'
                                                description: 'Tax type'
                                            rate:
                                                type: number
                                                example: 0.16
                                                description: 'Tax rate as decimal (0.16 = 16%)'
                                            withholding:
                                                type: boolean
                                                example: false
                                                description: 'true = retention (deducted from total), false = regular tax (added to subtotal)'
                                            base:
                                                type: number
                                                nullable: true
                                                description: 'Optional tax base amount'
                                            factor:
                                                type: string
                                                nullable: true
                                                example: 'Tasa'
                                                description: 'Optional tax factor'
                                            inclusive:
                                                type: boolean
                                                nullable: true
                                                description: 'Whether tax is included in the price'

