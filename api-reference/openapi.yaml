tags:
    - name: gigstack Connect
      description: |
          **Multi-Team Resource Access**

          gigstack Connect enables authorized teams to access and manage resources across multiple teams within the same billing account.

          ## 🔗 How It Works

          Add the `team` query parameter to **ANY endpoint** to access another team's resources:

          ```bash
          # Access team_xyz789's clients
          GET /clients?team=team_xyz789

          # Create invoice for team_abc123  
          POST /invoices?team=team_abc123

          # Update service in team_def456
          PUT /services/service_456?team=team_def456
          ```

          ## ✅ Requirements

          - Your API key must belong to a team with gigstack Connect enabled
          - Target team must share the same billing account  
          - Target team must exist

          ## ⚠️ Error Responses

          - `401 Unauthorized, not a master team` - gigstack Connect not enabled
          - `404 Team not found` - Target team doesn't exist
          - `401 Unauthorized, no matched teams` - Teams don't share billing account

          ## 🌐 Global Availability

          The `team` parameter works on **ALL 35+ endpoints** for seamless multi-team management across clients, invoices, payments, services, teams, and users.

    - name: Clients
      description: Client management operations with Mexican tax compliance

    - name: Services
      description: Service and product catalog management with SAT product keys

    - name: Invoices
      description: Invoice management with CFDI 4.0 compliance and SAT integration

    - name: Payments
      description: Payment processing, tracking, and refund management

    - name: Receipts
      description: Receipt creation and management with CFDI stamping capabilities

    - name: Teams
      description: Team management, settings, and member administration

    - name: Users
      description: User account management and password operations

    - name: Webhooks
      description: Webhook management for real-time event notifications

