        # =============================================================================
        # ENUM SCHEMAS - Payment, Automation, and SAT-related enums
        # =============================================================================

        PaymentMethodEnum:
            type: string
            enum: ['card', 'spei', 'oxxo', 'stripe-spei']
            description: |
                Payment method options:
                - `card`: Credit/debit card payments *(requires Stripe integration)*
                - `spei`: Mexican bank transfer (SPEI)
                - `oxxo`: OXXO convenience store payments *(requires Stripe integration)*
                - `stripe-spei`: Customer balance payments *(requires Stripe integration)*

                **Note:** `card`, `oxxo`, and `stripe-spei` are only available when your team has Stripe connected.
            example: 'card'

        PaymentFormEnum:
            type: string
            enum:
                - '01' # Efectivo
                - '02' # Cheque nominativo
                - '03' # Transferencia electrónica de fondos
                - '04' # Tarjeta de crédito
                - '05' # Monedero electrónico
                - '06' # Dinero electrónico
                - '08' # Vales de despensa
                - '12' # Dación en pago
                - '13' # Pago por subrogación
                - '14' # Pago por consignación
                - '15' # Condonación
                - '17' # Compensación
                - '23' # Novación
                - '24' # Confusión
                - '25' # Remisión de deuda
                - '26' # Prescripción o caducidad
                - '27' # A satisfacción del acreedor
                - '28' # Tarjeta de débito
                - '29' # Tarjeta de servicios
                - '30' # Aplicación de anticipos
                - '31' # Intermediario pagos
                - '99' # Por definir
            description: |
                SAT payment form codes (c_FormaPago) according to Mexican tax regulations.
                Most common forms:
                - `01`: Cash (Efectivo)
                - `03`: Electronic funds transfer (Transferencia electrónica)
                - `04`: Credit card (Tarjeta de crédito)
                - `28`: Debit card (Tarjeta de débito)
            example: '03'

        AutomationTypeEnum:
            type: string
            enum: ['pue_invoice', 'ppd_invoice_and_complement', 'none']
            description: |
                Payment automation types for invoice generation:
                - `payment`: Create PUE (Pago en Una sola Exhibición) invoice immediately
                - `payment_and_complement`: Create PPD invoice and payment complement
                - `none`: No automation, register payment only
            example: 'pue_invoice'

        # =============================================================================
        # ENHANCED ITEM SCHEMA - Items with third-party and SAT compliance support
        # =============================================================================

        ItemSchema:
            type: object
            required:
                - quantity
            properties:
                id:
                    type: string
                    nullable: true
                    example: 'service_1234567890'
                    description: 'Service/product ID reference'
                search:
                    type: object
                    properties:
                        on_key:
                            type: string
                            example: 'sku'
                            description: 'Field to search on (sku, name, etc.)'
                        on_value:
                            type: string
                            example: 'CONS-001'
                            description: 'Value to search for'
                        auto_create:
                            type: boolean
                            example: true
                            description: 'Create service if not found'
                        safety_check:
                            type: boolean
                            example: false
                            description: 'When true, prevents using multiple matching results (returns error). When false, uses the first result found. Default: false'
                quantity:
                    type: number
                    example: 1
                    description: 'Item quantity'
                description:
                    type: string
                    nullable: true
                    example: 'Consulting services'
                    description: 'Item description'
                sku:
                    type: string
                    nullable: true
                    example: 'CONS-001'
                    description: 'Stock keeping unit'
                product_key:
                    type: string
                    nullable: true
                    example: '80141503'
                    description: 'SAT product key (c_ClaveProdServ)'
                unit_key:
                    type: string
                    nullable: true
                    example: 'E48'
                    description: 'SAT unit key (c_ClaveUnidad)'
                unit_name:
                    type: string
                    nullable: true
                    example: 'Servicio'
                    description: 'Unit name'
                unit_price:
                    type: number
                    nullable: true
                    example: 1000.00
                    description: 'Unit price'
                discount:
                    type: number
                    nullable: true
                    example: 0
                    description: 'Discount amount or percentage'
                taxes:
                    type: array
                    items:
                        $ref: '#/components/schemas/TaxElement'
                    description: 'Tax elements applied to this item'
                third_party:
                    type: object
                    nullable: true
                    properties:
                        legal_name:
                            type: string
                            example: 'Third Party SA'
                            description: 'Third party legal name'
                        tax_id:
                            type: string
                            example: 'TPR800101ABC'
                            description: 'Third party RFC (tax ID)'
                        tax_system:
                            type: string
                            example: '601'
                            description: 'Third party tax system'
                        zip:
                            type: string
                            example: '03100'
                            description: 'Third party ZIP code'
                    description: 'Third party information for items provided by external parties'
                metadata:
                    type: object
                    nullable: true
                    additionalProperties: true
                    description: 'Additional metadata for the item'

        # SAT Support Documents - For 2026 Mexican fiscal reform compliance
        SATDocument:
            type: object
            required:
                - id
                - document_type
                - name
                - file_url
                - file_name
                - file_size
                - mime_type
                - compliance_status
                - created_at
                - linked_entities
            properties:
                id:
                    type: string
                    example: 'doc_abc123xyz'
                    description: 'Unique document identifier'
                document_type:
                    type: string
                    enum:
                        - contract
                        - delivery_proof
                        - payment_proof
                        - communication
                        - payment_confirmation
                        - subscription_info
                        - cronograma
                    description: 'Type of supporting document'
                name:
                    type: string
                    example: 'Service Contract.pdf'
                    description: 'Document name'
                description:
                    type: string
                    nullable: true
                    example: 'Main service contract for consulting services'
                    description: 'Optional document description'
                file_url:
                    type: string
                    format: uri
                    example: 'https://storage.googleapis.com/...'
                    description: 'Public URL to access the document'
                file_name:
                    type: string
                    example: 'contract.pdf'
                    description: 'Original filename'
                file_size:
                    type: integer
                    example: 245680
                    description: 'File size in bytes'
                mime_type:
                    type: string
                    example: 'application/pdf'
                    description: 'MIME type of the file'
                compliance_status:
                    type: string
                    enum:
                        - pending_review
                        - valid
                        - requires_update
                        - expired
                        - rejected
                    description: 'SAT compliance status'
                compliance_notes:
                    type: string
                    nullable: true
                    description: 'Notes about compliance status'
                valid_from:
                    type: integer
                    format: int64
                    nullable: true
                    description: 'Validity start timestamp (milliseconds)'
                valid_until:
                    type: integer
                    format: int64
                    nullable: true
                    description: 'Validity end timestamp (milliseconds)'
                ai_extraction:
                    type: object
                    nullable: true
                    properties:
                        extracted_at:
                            type: integer
                            format: int64
                            description: 'Extraction timestamp (milliseconds)'
                        extracted_by:
                            type: string
                            example: 'ai'
                            description: 'Source of extraction'
                        model:
                            type: string
                            example: 'gemini-3-flash'
                            description: 'AI model used'
                        confidence:
                            type: number
                            format: float
                            example: 0.95
                            description: 'Confidence score (0-1)'
                        extracted_data:
                            type: object
                            additionalProperties: true
                            description: 'Extracted structured data'
                        warnings:
                            type: array
                            items:
                                type: string
                            description: 'Extraction warnings'
                    description: 'AI extraction results if analyzed'
                audits:
                    type: array
                    items:
                        type: object
                        properties:
                            context_type:
                                type: string
                                enum: [invoice, payment, receipt]
                                description: 'Type of entity audited against'
                            context_id:
                                type: string
                                description: 'ID of entity audited against'
                            audited_at:
                                type: integer
                                format: int64
                                description: 'Audit timestamp (milliseconds)'
                            result:
                                type: string
                                enum: [valid, warning, mismatch]
                                description: 'Audit result'
                            summary:
                                type: string
                                description: 'Audit summary'
                            details:
                                type: object
                                additionalProperties: true
                                description: 'Detailed audit results'
                    description: 'Context-specific audit results'
                created_at:
                    type: integer
                    format: int64
                    example: 1677651234000
                    description: 'Creation timestamp (milliseconds)'
                created_by:
                    type: string
                    example: 'user_abc123'
                    description: 'User who created the document'
                updated_at:
                    type: integer
                    format: int64
                    example: 1677651234000
                    description: 'Last update timestamp (milliseconds)'
                linked_entities:
                    type: array
                    items:
                        type: object
                        properties:
                            entity_type:
                                type: string
                                enum: [invoice, payment, receipt, client]
                                description: 'Type of linked entity'
                            entity_id:
                                type: string
                                description: 'ID of linked entity'
                            linked_at:
                                type: integer
                                format: int64
                                description: 'Link timestamp (milliseconds)'
                    description: 'Entities this document is linked to'

        UploadSupportDocumentInput:
            type: object
            required:
                - file
                - documentType
            properties:
                file:
                    type: string
                    format: binary
                    description: 'The file to upload (PDF or image, max 10MB)'
                documentType:
                    type: string
                    enum:
                        - contract
                        - delivery_proof
                        - payment_proof
                        - communication
                        - payment_confirmation
                        - subscription_info
                    description: 'Type of supporting document'
                name:
                    type: string
                    example: 'Service Contract'
                    description: 'Optional custom name for the document'
                description:
                    type: string
                    example: 'Master services agreement for 2026'
                    description: 'Optional description of the document'

paths:
    # =============================================================================
    # CLIENTS - Organized by HTTP Method (GET → POST → PUT → DELETE)
    # =============================================================================

    /clients:
        get:
            tags:
                - Clients
            summary: List clients
            description: |
                Retrieve a paginated list of clients with powerful filtering capabilities.

                **gigstack Connect:** Access other teams' clients using the `team` parameter.

                **Filtering Options:**
                - Filter by creation date using comparison operators
                - Filter by metadata fields using dot or underscore notation (e.g., `metadata.external_id` or `metadata_external_id`)
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
                - $ref: '#/components/parameters/LimitParam'
                - $ref: '#/components/parameters/NextParam'
                - $ref: '#/components/parameters/OrderByParam'
                - $ref: '#/components/parameters/SortParam'
                - $ref: '#/components/parameters/CreatedGteParam'
                - $ref: '#/components/parameters/CreatedLteParam'
                - name: metadata.{key}
                  in: query
                  description: |
                    Filter by any metadata field using dot notation (e.g., `metadata.external_id=EXT-123`)
                    or underscore notation (e.g., `metadata_external_id=EXT-123`).
                    Both formats are supported and equivalent.
                    Uses Typesense search for efficient querying without requiring Firestore indexes.
                  required: false
                  schema:
                      type: string
                  style: form
                - name: page
                  in: query
                  description: |
                    Page number for pagination when using metadata filters (default 1).
                    Only applies when filtering by metadata fields.
                  required: false
                  schema:
                      type: integer
                      minimum: 1
                      default: 1

            responses:
                '200':
                    description: Clients retrieved successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Clients retrieved successfully'
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/ApiPublicClient'
                                    has_more:
                                        type: boolean
                                        example: false
                                    total_results:
                                        type: integer
                                        example: 25
                                    next:
                                        type: string
                                        nullable: true
                                        example: 'eyJjcmVhdGVkX2F0IjoxNjc3NjUxMjM0fQ=='
                            example:
                                message: 'Clients retrieved successfully'
                                data:
                                    - id: 'client_1234567890'
                                      name: 'Juan Pérez García'
                                      email: 'juan.perez@ejemplo.com'
                                      tax_id: 'PEGJ800101ABC'
                                      tax_system: '601'
                                      legal_name: 'Juan Pérez García'
                                      address:
                                          street: 'Av. Insurgentes Sur 123'
                                          zip: '03100'
                                          city: 'Ciudad de México'
                                          state: 'CDMX'
                                          country: 'MEX'
                                      is_valid: true
                                      livemode: true
                                      created_at: 1677651234
                                      team: 'team_1234567890'
                                      owner: 'user_1234567890'
                                has_more: false
                                total_results: 1
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                '403':
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'
        post:
            tags:
                - Clients
            summary: Create client
            description: |
                Create a new client with fiscal information for Mexican tax compliance.

                **Duplicate Prevention (Upsert):** Use the `search` parameter to find existing clients before creating:
                - If a match is found and `search.update` is `false` (default): Returns the existing client without modifications.
                - If a match is found and `search.update` is `true`: Updates the existing client with the provided data and returns it.
                - If no match is found: Creates a new client.

                This is useful for integrations that may send the same client multiple times.

                **gigstack Connect:** Create clients for other teams using the `team` parameter.
            security:
                - apiKey: []
            parameters:
                - $ref: '#/components/parameters/TeamParameter'
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ClientInput'
                        example:
                            name: 'Juan Pérez García'
                            email: 'juan.perez@ejemplo.com'
                            company: 'Empresa SA de CV'
                            phone: '+52 55 1234 5678'
                            legal_name: 'Juan Pérez García'
                            tax_id: 'PEGJ800101ABC'
                            use: 'P01'
                            tax_system: '601'
                            address:
                                country: 'MEX'
                                street: 'Av. Insurgentes Sur'
                                zip: '03100'
                                city: 'Ciudad de México'
                                state: 'CDMX'
                                exterior: '123'
                                interior: '4B'
                                municipality: 'Benito Juárez'
                                neighborhood: 'Del Valle'
                            bcc: ['admin@empresa.com']
                            metadata:
                                custom_field: 'value'
                                department: 'sales'
                            defaults:
                                keep_full_legal_name: false
                                issue_automatic_invoices: false
                                issue_invoiceable_receipts: true
                            search:
                                on_key: 'tax_id'
                                on_value: 'PEGJ800101ABC'
                                update: false
            responses:
                '200':
                    description: Existing client found (when using `search` parameter)
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Existing client found'
                                    data:
                                        $ref: '#/components/schemas/ApiPublicClient'
                            examples:
                                existingClient:
                                    summary: Existing client found
                                    value:
                                        message: 'Existing client found'
                                        data:
                                            id: 'client_1234567890'
                                            name: 'Juan Pérez García'
                                            email: 'juan.perez@ejemplo.com'
                                            tax_id: 'PEGJ800101ABC'
                                            tax_system: '601'
                                            legal_name: 'Juan Pérez García'
                                            address:
                                                street: 'Av. Insurgentes Sur 123'
                                                zip: '03100'
                                                city: 'Ciudad de México'
                                                state: 'CDMX'
                                                country: 'MEX'
                                            is_valid: true
                                            livemode: true
                                            created_at: 1677651234
                                            team: 'team_1234567890'
                                            owner: 'user_1234567890'
                                            from: 'api'
                                existingClientUpdated:
                                    summary: Existing client found and updated
                                    value:
                                        message: 'Existing client found and updated'
                                        data:
                                            id: 'client_1234567890'
                                            name: 'Juan Pérez García'
                                            email: 'juan.perez@ejemplo.com'
                                            tax_id: 'PEGJ800101ABC'
                                            tax_system: '601'
                                            legal_name: 'Juan Pérez García'
                                            address:
                                                street: 'Av. Insurgentes Sur 123'
                                                zip: '03100'
                                                city: 'Ciudad de México'
                                                state: 'CDMX'
                                                country: 'MEX'
                                            is_valid: true
                                            livemode: true
                                            created_at: 1677651234
                                            team: 'team_1234567890'
                                            owner: 'user_1234567890'
                                            from: 'api'
                '201':
                    description: Client created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: 'Client created successfully'
                                    data:
                                        $ref: '#/components/schemas/ApiPublicClient'
                            example:
                                message: 'Client created successfully'
                                data:
                                    id: 'client_1234567890'
                                    name: 'Juan Pérez García'
                                    email: 'juan.perez@ejemplo.com'
                                    tax_id: 'PEGJ800101ABC'
                                    tax_system: '601'
                                    legal_name: 'Juan Pérez García'
                                    address:
                                        street: 'Av. Insurgentes Sur 123'
                                        zip: '03100'
                                        city: 'Ciudad de México'
                                        state: 'CDMX'
                                        country: 'MEX'
                                    is_valid: true
                                    livemode: true
                                    created_at: 1677651234
                                    team: 'team_1234567890'
                                    owner: 'user_1234567890'
                                    from: 'api'
                '400':
                    description: Bad Request
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                '401':
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                '403':
                    description: Forbidden
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '409':
                    description: Conflict - Multiple clients match the search criteria
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                        example: false
                                    error:
                                        type: object
                                        properties:
                                            code:
                                                type: string
                                                example: 'resource_conflict'
                                            message:
                                                type: string
                                                example: 'Multiple clients found matching tax_id="PEGJ800101ABC". Please use a more specific search criteria.'
                                            details:
                                                type: array
                                                items:
                                                    type: string
                                                description: List of matching client IDs
                                                example: ['client_1234567890', 'client_0987654321']
                '500':
                    description: Internal Server Error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InternalServerError'

